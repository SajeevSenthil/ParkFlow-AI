# ParkFlow-AI pipeline configuration.
# All paths are relative to the project root unless absolute.

paths:
  raw_data: "dataset/jan to may police violation_anonymized791b166.csv.gz"   # real BTP export (gzipped; pandas reads it directly)
  artifacts_dir: artifacts

preprocessing:
  # When true, only records with validation_status == "approved" are kept for
  # model training and hotspot computation. Set false to include all records.
  approved_only: false
  # Statuses dropped when approved_only is false (confirmed false positives).
  exclude_statuses: ["rejected", "duplicate"]

spatial:
  # Junction is the primary zone; coordinate grid is the fallback for "No Junction" rows.
  grid_decimals: 2          # ~1.1 km cells. 2 dp keeps fallback-zone count sane (~550);
                            # 3 dp explodes to ~5700 tiny, noisy cells on this dataset.
  missing_junction_label: "No Junction"
  missing_station_label: "Unknown Station"

temporal:
  timezone: "Asia/Kolkata"  # raw timestamps are UTC; convert so hour-of-day = local time
  bin_hours: 3              # aggregation window. 1=hourly, 3/4=coarser, 24=daily (see PRD 7.4)
  # Lag/rolling windows are expressed in DAYS and converted to bins internally.
  lag_days: [1, 7]          # previous-day and previous-week same-bin lags
  rolling_days: [7, 30]     # rolling mean windows
  # Rolling multi-horizon forecast: how many future bins to predict recursively.
  # 8 bins x 3h = the next 24 hours. The command centre sees a full-day timeline,
  # not just the single next window. Override at runtime with `parkflow run --horizon N`.
  forecast_horizon_bins: 8

model:
  test_fraction: 0.2        # last 20% of the time range is the held-out future test set
  objective: "reg:tweedie"  # Tweedie (compound Poisson-Gamma) handles zero-inflation +
  tweedie_variance_power: 1.3   # overdispersion in sparse counts better than plain Poisson
  n_estimators: 400
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 5
  random_state: 42

# Predicted-count -> operational risk band (PRD 8.1).
risk_bands:
  - { name: "Low",      max: 5 }
  - { name: "Medium",   max: 15 }
  - { name: "High",     max: 25 }
  - { name: "Critical", max: .inf }

# Enforcement priority weights (PRD 8.4).
priority:
  w_predicted: 0.6
  w_historical: 0.3
  w_junction: 0.1

# Parking Congestion Impact Index (PRD 8.2).
# Headline = estimated % road capacity lost, grounded in PCU (Passenger Car Units,
# Indo-HCM/IRC) + the HCM saturation-flow principle, and modulated by data-observed
# signals (violation severity, peak-hour). Uses ONLY provided data + standard
# traffic-engineering constants -- NO external datasets.
congestion:
  pcu_weights:                  # passenger-car-equivalents per vehicle category
    "BUS (BMTC/KSRTC)": 3.5
    "PRIVATE BUS": 3.5
    BUS: 3.5
    LGV: 2.2
    TEMPO: 2.0
    "GOODS AUTO": 1.5
    "PASSENGER AUTO": 1.2
    CAR: 1.0
    VAN: 1.0
    "MAXI-CAB": 1.0
    "MOTOR CYCLE": 0.5
    SCOOTER: 0.5
    MOPED: 0.5
  default_pcu: 1.0
  junction_road_factor: 1.3     # junction approaches suffer more side-friction
  side_street_factor: 1.0
  max_capacity_reduction_pct: 60  # on-street parking cuts capacity ~17-90% (VISSIM/Indo-HCM); cap here
  saturation_pcu: 25            # PCU-load at which capacity reduction approaches the cap

  # Carriageway-blocking severity per violation type (DOUBLE PARKING blocks a moving
  # lane directly; MAIN ROAD narrows the carriageway). Modulates the impact estimate.
  violation_severity_weights:
    "DOUBLE PARKING": 3.0
    "PARKING IN A MAIN ROAD": 2.5
    "PARKING NEAR TRAFFIC LIGHT OR ZEBRA CROSS": 2.0
    "PARKING NEAR ROAD CROSSING": 2.0
    "PARKING OPPOSITE TO ANOTHER PARKED VEHICLE": 1.8
    "PARKING NEAR BUSTOP/SCHOOL/HOSPITAL ETC": 1.5
    "NO PARKING": 1.2
    "WRONG PARKING": 1.0
    "PARKING ON FOOTPATH": 1.0
    "PARKING OTHER THAN BUS STOP": 1.0
  default_violation_severity: 1.0
  # IST hour ranges considered peak congestion windows (impact amplified).
  peak_hours_morning: [7, 8, 9, 10]
  peak_hours_evening: [17, 18, 19]
  peak_hour_multiplier: 1.5
  # Vehicles seen > this many times at a zone count as repeat offenders.
  repeat_offender_threshold: 2

# Hotspot threshold for ranking metrics (Top-K / PR-AUC) -- a cell is a "hotspot"
# if its actual count is at/above this value.
evaluation:
  hotspot_threshold: 5
  top_k: 10

patrol:
  num_teams: 3
  spatial_suppress_km: 1.0   # greedy fallback: don't assign two teams within this radius
  # Route-optimized deployment (OR-Tools CVRP). Each team drives an ordered route
  # through several top-priority zones in one shift, minimizing total travel distance
  # on a haversine matrix built from zone coordinates (NO external map data / API).
  zones_per_team: 4          # shift capacity: max zones one team covers per route
  route_candidate_pool: 30   # optimize routes over the top-N priority zones

# Economic impact model (PRD 8.6) — translates predicted violations into commuter
# productivity lost, in rupees. The ONLY economic source is the Bengaluru-specific study:
#   Vijayalakshmi S & Krishna Raj (2023), "Estimation of Productivity Loss Due to Traffic
#   Congestion: Evidence from Bengaluru City", ISEC Working Paper 554.
#   https://www.isec.ac.in/wp-content/uploads/2023/09/WP-554-Vijayalakshmi-and-Krishna-Raj-Final.pdf
# That study treats Value of Time as the commuter's hourly wage applied to travel-time delay
# (a per-commuter person-hours model — it does NOT use vehicle occupancy).
#
# value_of_time_inr_per_hour: DERIVED FROM THE PAPER. Its Table 2 reports Rs.11,45,568 of
#   productive-hour cost across 6,998 hours lost -> Rs.1,145,568 / 6,998 = Rs.163.70/hr, the
#   paper's own effective hourly wage (2018-19). Cross-check: sample average income Rs.34,952/mo
#   (paper, 2018-19) / (8h x 26 working days = 208 h/mo) = Rs.168/hr — consistent. We use the
#   table-derived Rs.164/hr (2018-19 rupees) as the single defensible figure. NOTE: this is a
#   2018-19 wage; the paper records per-capita income growing ~14%/yr, so the present-day value
#   of time is higher — kept at the paper's stated base year for honesty rather than extrapolated.
# avg_vehicle_occupancy: TUNABLE MODELLING ASSUMPTION (not from the paper). The ISEC study is a
#   per-commuter person-hours model with no occupancy term. We carry a 1.0 multiplier so the cost
#   stays per-commuter, faithful to the paper. (Raise it only to deliberately model multi-occupant
#   vehicles — that would be our assumption, NOT the paper's.)
# vehicles_blocked_per_violation, max_delay_hours_per_vehicle: TUNABLE MODELLING ASSUMPTIONS —
#   the project's own bridge from a predicted violation count to commuter-hours of delay. They are
#   NOT from the paper; the paper measures realised late-arrival hours from a primary survey.
# Delay is tied to the congestion layer's estimated capacity reduction so the rupee figure
# inherits the same PCU/HCM grounding rather than being a free-floating guess.
#
# Real-world scale anchor (ISEC WP-554): city-wide ~7.07 lakh productive hours lost in 2018
# costing ~Rs.11.7 billion (~0.027% of Bengaluru District income, 2017-18).
economics:
  value_of_time_inr_per_hour: 164.0      # paper's effective hourly wage: Rs.11,45,568 / 6,998 h (ISEC WP-554, Table 2, 2018-19)
  avg_vehicle_occupancy: 1.0             # MODELLING ASSUMPTION: 1.0 keeps cost per-commuter (paper has no occupancy term)
  vehicles_blocked_per_violation: 25.0   # MODELLING ASSUMPTION: commuters forced to slow/queue per violation event
  max_delay_hours_per_vehicle: 0.10      # MODELLING ASSUMPTION: delay (hrs) at full capacity block (~6 min); scaled by est_capacity_reduction_pct

# Spatial displacement model (PRD 8.7) — behavioural response of offenders to enforcement.
# When a zone is patrolled, a share of would-be violations relocates to the nearest
# UNcovered zone instead of disappearing. Lets us show that route-optimized coverage
# leaks fewer violations into blindspots than naive greedy allocation.
displacement:
  displaced_fraction: 0.30      # share of a covered zone's violations that relocate
  displacement_radius_km: 0.5   # offenders move at most this far to re-park
  coverage_radius_km: 1.0       # a zone is "covered" if a patrol stop is within this radius

# Violation types kept as genuine parking violations (PRD 4.3).
# violation_type in the raw data is a JSON array per record; a record is kept if
# ANY of its tags is in this set. Expanded to cover all parking subtypes present.
valid_violation_types:
  - "NO PARKING"
  - "WRONG PARKING"
  - "PARKING IN A MAIN ROAD"
  - "PARKING NEAR ROAD CROSSING"
  - "PARKING ON FOOTPATH"
  - "PARKING NEAR BUSTOP/SCHOOL/HOSPITAL ETC"
  - "DOUBLE PARKING"
  - "PARKING NEAR TRAFFIC LIGHT OR ZEBRA CROSS"
  - "PARKING OPPOSITE TO ANOTHER PARKED VEHICLE"
  - "PARKING OTHER THAN BUS STOP"

logging:
  level: INFO
